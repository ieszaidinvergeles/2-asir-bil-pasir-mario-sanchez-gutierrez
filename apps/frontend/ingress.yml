apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plataforma-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - host: tfg-plataforma.test
    http:
      paths:
      # Ruta para el Backend API
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3000
      # Ruta para el Frontend (debe ir al final como catch-all)
      - path: /()(.*)
        pathType: Prefix
        backend:
          service:
            name: nginx-service 
            port:
              number: 80