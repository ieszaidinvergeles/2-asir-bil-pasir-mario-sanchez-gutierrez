apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-tfg
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  tfg-plataforma.json: |
    {
      "title": "TFG Plataforma - Observabilidad",
      "uid": "tfg-plataforma",
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "constant",
            "query": "default",
            "hide": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "CPU por Pod (namespace: default)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"default\"}[2m])) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 2,
          "title": "Memoria por Pod (namespace: default)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"default\"}) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "I/O Disco - Lecturas por Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "Bps", "custom": { "lineWidth": 2 } }
          },
          "targets": [
            {
              "expr": "sum(rate(container_fs_reads_bytes_total{namespace=\"default\"}[2m])) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "I/O Disco - Escrituras por Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "Bps", "custom": { "lineWidth": 2 } }
          },
          "targets": [
            {
              "expr": "sum(rate(container_fs_writes_bytes_total{namespace=\"default\"}[2m])) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Red del Nodo - Tráfico Recibido",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "Bps", "custom": { "lineWidth": 2 } }
          },
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{device=\"eth0\"}[2m])",
              "legendFormat": "RX eth0",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Red del Nodo - Tráfico Enviado",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "Bps", "custom": { "lineWidth": 2 } }
          },
          "targets": [
            {
              "expr": "rate(node_network_transmit_bytes_total{device=\"eth0\"}[2m])",
              "legendFormat": "TX eth0",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "CPU Total del Nodo",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "lineWidth": 2 } }
          },
          "targets": [
            {
              "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[2m]))",
              "legendFormat": "CPU usada",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Réplicas disponibles por Deployment",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "yellow", "value": 1 },
                  { "color": "green", "value": 2 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"default\"}",
              "legendFormat": "{{ deployment }}",
              "refId": "A"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" }
        }
      ],
      "schemaVersion": 36
    }
