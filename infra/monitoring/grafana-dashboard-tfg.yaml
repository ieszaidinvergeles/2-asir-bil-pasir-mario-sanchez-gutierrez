apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-tfg
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  tfg-plataforma.json: |
    {
      "title": "TFG Plataforma - Observabilidad",
      "uid": "tfg-plataforma",
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "constant",
            "query": "default",
            "hide": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "CPU por Pod (namespace: default)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"default\", container!=\"\", container!=\"POD\"}[2m])) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 2,
          "title": "Memoria por Pod (namespace: default)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"default\", container!=\"\", container!=\"POD\"}) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Peticiones HTTP por Segundo (Ingress)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests[2m])) by (ingress, status)",
              "legendFormat": "{{ ingress }} - {{ status }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Latencia HTTP P50 / P95 / P99 (Ingress)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket[2m])) by (le, ingress))",
              "legendFormat": "P50 {{ ingress }}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket[2m])) by (le, ingress))",
              "legendFormat": "P95 {{ ingress }}",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket[2m])) by (le, ingress))",
              "legendFormat": "P99 {{ ingress }}",
              "refId": "C"
            }
          ]
        },
        {
          "id": 5,
          "title": "Tráfico de Red - Recibido",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"default\"}[2m])) by (pod)",
              "legendFormat": "RX {{ pod }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Tráfico de Red - Enviado",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"default\"}[2m])) by (pod)",
              "legendFormat": "TX {{ pod }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Errores HTTP (4xx / 5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 },
              "color": { "mode": "fixed", "fixedColor": "red" }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{status=~\"[45]..\"}[2m])) by (ingress, status)",
              "legendFormat": "{{ ingress }} HTTP {{ status }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Réplicas disponibles por Deployment",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "yellow", "value": 1 },
                  { "color": "green", "value": 2 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"default\"}",
              "legendFormat": "{{ deployment }}",
              "refId": "A"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" }
        }
      ],
      "schemaVersion": 36
    }
